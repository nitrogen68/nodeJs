<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDIAGRAPH Pro - Video Extractor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #cbd5e1; }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        #mainTab-history { position: relative; }
        .notification-badge {
            position: absolute; top: 4px; right: 8px; width: 10px; height: 10px;
            background-color: #ef4444; border-radius: 50%; border: 2px solid #0f172a; z-index: 50;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10" onload="initApp()">

    <div class="max-w-4xl mx-auto mt-6">
        <header class="text-center mb-10">
            <h1 onclick="location.reload()" class="text-5xl font-black text-white tracking-tighter italic cursor-pointer">MEDIA<span class="text-blue-500 not-italic">GRAPH</span></h1>
            <div class="flex justify-center mt-6 gap-4">
                <span class="text-[10px] font-bold bg-slate-900 px-3 py-1 rounded-full border border-white/10">FACEBOOK</span>
                <span class="text-[10px] font-bold bg-slate-900 px-3 py-1 rounded-full border border-white/10">TWITTER</span>
                <span class="text-[10px] font-bold bg-slate-900 px-3 py-1 rounded-full border border-white/10">TIKTOK</span>
            </div>
        </header>

        <div class="flex p-1 bg-slate-900/80 rounded-xl mb-6 border border-white/5">
            <button onclick="switchMainTab('downloader')" id="mainTab-downloader" class="flex-1 py-3 text-sm font-bold rounded-lg bg-blue-600 text-white">Downloader</button>
            <button onclick="switchMainTab('history')" id="mainTab-history" class="flex-1 py-3 text-sm font-bold rounded-lg text-slate-400 relative">
                History <div id="badgeContainerMain"></div>
            </button>
        </div>

        <div id="section-downloader" class="block">
            <div class="bg-slate-900/50 p-6 rounded-[2.5rem] border border-white/5">
                <form id="scrape-form" class="flex flex-col md:flex-row gap-4">
                    <input type="text" id="targetUrl" placeholder="Tempel URL target..." required class="flex-1 bg-black/50 border border-slate-800 rounded-2xl px-6 py-5 text-white focus:ring-2 focus:ring-blue-500">
                    <button type="submit" id="btnSubmit" class="bg-blue-600 text-white font-black py-5 px-10 rounded-2xl">EKSTRAK</button>
                </form>
            </div>

            <div id="loading" class="hidden text-center py-16">
                <div class="loader ease-linear rounded-full border-4 h-16 w-16 mb-6 mx-auto"></div>
                <p class="text-white font-semibold">Memproses ke Videy...</p>
            </div>

            <div id="resultWrapper" class="hidden mt-8 space-y-6">
                <div id="dynamicVideosContainer"></div>
                <pre id="resJson" class="p-4 bg-black/40 rounded-xl text-[10px] text-slate-500 overflow-x-auto custom-scrollbar"></pre>
            </div>
        </div>

        <div id="section-history" class="hidden">
            <div class="bg-slate-900/80 p-6 rounded-[2.5rem] border border-white/5">
                <div class="flex gap-2 mb-6">
                    <button onclick="renderHistory('Facebook')" id="tab-Facebook" class="flex-1 py-2 rounded-lg bg-slate-800 text-xs">Facebook</button>
                    <button onclick="renderHistory('Twitter')" id="tab-Twitter" class="flex-1 py-2 rounded-lg bg-slate-800 text-xs">Twitter</button>
                    <button onclick="renderHistory('Tiktok')" id="tab-Tiktok" class="flex-1 py-2 rounded-lg bg-slate-800 text-xs">Tiktok</button>
                </div>
                <div id="historyList" class="space-y-3 h-[400px] overflow-y-auto custom-scrollbar"></div>
            </div>
        </div>
    </div>

    <script>
        let currentHistoryTab = 'Twitter';

        function initApp() {
            renderHistory('Twitter');
            updateHistoryBadge();
        }

        function switchMainTab(tabId) {
            document.getElementById('section-downloader').classList.toggle('hidden', tabId !== 'downloader');
            document.getElementById('section-history').classList.toggle('hidden', tabId !== 'history');
            
            document.getElementById('mainTab-downloader').className = tabId === 'downloader' ? "flex-1 py-3 text-sm font-bold rounded-lg bg-blue-600 text-white" : "flex-1 py-3 text-sm font-bold text-slate-400";
            document.getElementById('mainTab-history').className = tabId === 'history' ? "flex-1 py-3 text-sm font-bold rounded-lg bg-blue-600 text-white relative" : "flex-1 py-3 text-sm font-bold text-slate-400 relative";
            
            if(tabId === 'history') {
                const history = JSON.parse(localStorage.getItem('scrapeHistory') || '[]');
                localStorage.setItem('scrapeHistory', JSON.stringify(history.map(i => ({...i, isNew: false}))));
                updateHistoryBadge();
                renderHistory(currentHistoryTab);
            }
        }

        function updateHistoryBadge() {
            const history = JSON.parse(localStorage.getItem('scrapeHistory') || '[]');
            const hasNew = history.some(item => item.isNew === true);
            document.getElementById('badgeContainerMain').innerHTML = hasNew ? `<span class="notification-badge"></span><span class="notification-badge animate-ping" style="opacity:0.6"></span>` : '';
        }

        function getDomainCategory(urlStr) {
            try {
                const host = new URL(urlStr).hostname.toLowerCase();
                if (host.includes('facebook.com') || host.includes('fb.com')) return 'Facebook';
                if (host.includes('twitter.com') || host.includes('x.com')) return 'Twitter';
                if (host.includes('tiktok.com')) return 'Tiktok';
                return 'Media';
            } catch { return 'Media'; }
        }

        /* --- SINKRONISASI HASIL (VIDEY FORMAT) --- */
        function renderVideos(data, targetUrl) {
            const container = document.getElementById('dynamicVideosContainer');
            const platform = getDomainCategory(targetUrl);
            const displayTitle = `${platform}: ${data.title}`;

            container.innerHTML = `
                <div class="bg-slate-900/80 rounded-[2rem] overflow-hidden border border-white/10 p-6 shadow-2xl">
                    <h3 class="text-blue-400 font-bold text-lg mb-4">${displayTitle}</h3>
                    <div class="bg-black/50 p-4 rounded-xl border border-white/5 mb-4 break-all">
                        <a href="${data.videyUrl}" target="_blank" class="text-emerald-400 font-mono text-sm">${data.videyUrl}</a>
                    </div>
                    <div class="aspect-video bg-black rounded-xl overflow-hidden mb-4">
                        <video src="${data.videyUrl.replace('v/?id=', '')}.mp4" controls class="w-full h-full"></video>
                    </div>
                    <button onclick="copyToClipboard('${data.videyUrl}', this)" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-white transition-transform active:scale-95">SALIN LINK VIDEY</button>
                </div>`;
        }

        document.getElementById('scrape-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const urlInput = document.getElementById('targetUrl');
            const loading = document.getElementById('loading');
            const resultWrapper = document.getElementById('resultWrapper');
            
            loading.classList.remove('hidden');
            resultWrapper.classList.add('hidden');

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput.value })
                });
                const res = await response.json();

                if (res.success) {
                    renderVideos(res.data, urlInput.value);
                    saveToHistory(urlInput.value, res.data.title, res.data.videyUrl);
                    document.getElementById('resJson').textContent = JSON.stringify(res, null, 4);
                    resultWrapper.classList.remove('hidden');
                } else {
                    alert("Gagal: " + res.error);
                }
            } catch (e) { alert("Server Error"); }
            finally { loading.classList.add('hidden'); updateHistoryBadge(); }
        });

        function saveToHistory(url, title, videyUrl) {
            let history = JSON.parse(localStorage.getItem('scrapeHistory') || '[]');
            const platform = getDomainCategory(url);
            history.unshift({ id: Date.now(), url, title: `${platform}: ${title}`, videyUrl, date: new Date().toLocaleString(), isNew: true });
            localStorage.setItem('scrapeHistory', JSON.stringify(history.slice(0, 50)));
        }

        function renderHistory(filter) {
            currentHistoryTab = filter;
            const list = document.getElementById('historyList');
            const history = JSON.parse(localStorage.getItem('scrapeHistory') || '[]').filter(i => i.title.startsWith(filter));
            
            list.innerHTML = history.length ? history.map(item => `
                <div class="bg-black/30 p-4 rounded-xl border border-white/5 relative">
                    <div class="text-[10px] text-slate-500 mb-1">${item.date}</div>
                    <div class="font-bold text-sm text-slate-200 truncate pr-10">${item.title}</div>
                    <div class="text-[10px] text-blue-400 truncate mt-1">${item.videyUrl}</div>
                    <button onclick="deleteHistory(${item.id})" class="absolute top-4 right-4 text-slate-500">×</button>
                </div>`).join('') : '<p class="text-center text-slate-600 py-10">Kosong</p>';
        }

        function deleteHistory(id) {
            let history = JSON.parse(localStorage.getItem('scrapeHistory') || '[]');
            localStorage.setItem('scrapeHistory', JSON.stringify(history.filter(h => h.id !== id)));
            renderHistory(currentHistoryTab);
            updateHistoryBadge();
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text);
            const old = btn.innerText; btn.innerText = "COPIED!";
            setTimeout(() => btn.innerText = old, 1500);
        }

        async function pasteFromClipboard() {
            const text = await navigator.clipboard.readText();
            document.getElementById('targetUrl').value = text;
        }
    </script>
</body>
</html>
